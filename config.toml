model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 900000

# Segurança / padrão
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"

[profiles.pm]
model = "gpt-5.4"
sandbox_mode = "workspace-write"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "concise"
model_instructions_file = "~/.codex/prompts/pm.md"

[profiles.arq]
model = "gpt-5.4"
sandbox_mode = "workspace-write"
model_reasoning_effort = "xhigh"
model_instructions_file = "~/.codex/prompts/architect.md"

[profiles.dev]
model = "gpt-5.4"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
model_instructions_file = "~/.codex/prompts/dev.md"

[profiles.qa]
model = "gpt-5.4"
sandbox_mode = "read-only"
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "low"
model_instructions_file = "~/.codex/prompts/reviewer.md"

[projects."/home/raivitor/gitlab/shiva-remessas"]
trust_level = "trusted"

[projects."/home/raivitor/.codex"]
trust_level = "trusted"

[projects."/home/raivitor/projeto/boilerplate-2026"]
trust_level = "trusted"

[sandbox_workspace_write]
network_access = false
writable_roots = ["."]
exclude_slash_tmp = true
exclude_tmpdir_env_var = true

[otel]
exporter = "none"
trace_exporter = "none"

[mcp_servers.pg]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres", "postgresql://admin:adminadmin@localhost:5432/shiva5"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[features]
apps = true

[tui]
status_line = ["model-with-reasoning", "context-remaining", "project-root", "git-branch", "context-used", "five-hour-limit", "context-window-size", "fast-mode"]
